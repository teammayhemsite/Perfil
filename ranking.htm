<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://cdn.discordapp.com/emojis/1380340818224877710.webp?size=96">
    <title>Ranking</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url(z-FundoSite.webp) center/cover no-repeat;
            font-family: Arial, sans-serif;
        }

        .card2 {
            width: 420px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            text-align: center;
            color: rgb(0, 0, 0);
        }

        .hotbar {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
        }

        .hotbar button {
            margin: 5px;
            padding: 5px;
            border-radius: 5px;
            cursor: pointer;
        }

        .mural {
            display: none;
        }

        .ativo {
            display: block;
        }

        .booster {
            width: 370px;
            padding: 25px;
            border-radius: 20px;
            background: rgba(98, 0, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(89, 0, 255, 0.5);
            box-shadow: 0 8px 30px rgba(153, 0, 255, 0.4);
            text-align: center;
            color: rgb(0, 0, 0);
        }

        .premium {
            width: 370px;
            padding: 25px;
            border-radius: 20px;

            background: linear-gradient(145deg,
                    rgba(255, 255, 255, 0.15),
                    rgba(212, 175, 55, 0.35),
                    rgba(166, 124, 0, 0.35));

            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);

            border: 1px solid rgba(255, 215, 0, 0.8);

            box-shadow:
                inset 0 2px 6px rgba(255, 255, 255, 0.4),
                inset 0 -2px 6px rgba(0, 0, 0, 0.2),
                0 10px 35px rgba(0, 0, 0, 0.5),
                0 0 25px rgba(255, 215, 0, 0.7);

            text-align: center;
            color: #1a1a1a;
        }        

        .black {
            width: 370px;
            padding: 25px;
            border-radius: 20px;
            background: rgb(153, 153, 153);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgb(110, 110, 110);
            box-shadow: 0 8px 30px rgb(0, 0, 0);
            text-align: center;
            color: rgb(0, 0, 0);
        }

        .classic {
            width: 370px;
            padding: 25px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            text-align: center;
            color: rgb(0, 0, 0);
        }

        .perfil {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;

            position: absolute;
            top: 25px;
            left: 7%;
            transform: translate(-50%, -50%);

            border: 2px solid rgba(255, 255, 255, 0.192);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.151);
        }

        .ali {
            position: absolute;
            right: 1px;
            top: 1%;
            text-decoration: none;
            color: black;
            width: 390px;
            padding: 15px;
            border-radius: 20px;
        }
    </style>

</head>

<body oncontextmenu="return false">
    <div class="card2">
        <a href="https://teammayhem.vercel.app/" style="text-decoration: none; color: black;">❬ Voltar</a>
        <H1>Ranking de usuarios</H1>

                <a href="krpris.htm" class="ali">ƙཞ℘ཞıʂ</a>
            </div>
            <br>
            <div class="premium">
                <img src="https://i.pinimg.com/736x/80/15/22/801522d478d68c959c8c563dc21e762f.jpg" class="perfil">
                <a href="vtzadas.htm" class="ali">pzclan</a>

            <br>
            <div class="booster">
                <img src="https://i.pinimg.com/1200x/c6/d3/84/c6d384c03d5163d659a35992f9e7886b.jpg" class="perfil">
                <a href="6e6y.htm" class="ali">6e6y</a>
            </div>
            <br>        
            <div class="black">
                <img src="z-Perfil-vtzadas021.png" class="perfil">
                <a href="vtzadas021.htm" class="ali">vtzada</a>
            </div>
            <br>

        </div>
        <!-- mural2-->
        <div id="mural2" class="mural">
            <div class="classic">

        <!--Divisa mural-->

        <div class="hotbar">
            <button onclick="trocar(1)">1</button>
            <button onclick="trocar(2)">2</button>
        </div>
    </div>
    <script>
        function trocar(num) {
            let murais = document.querySelectorAll('.mural');

            murais.forEach(m => m.classList.remove('ativo'));

            document.getElementById('mural' + num).classList.add('ativo');
        }
    </script>

    </div>
    <script>
        document.addEventListener("keydown", function (e) {
            if (e.key === "F12") {
                e.preventDefault();
            }
            if (e.ctrlKey && e.key === "u") {
                e.preventDefault();
            }
            if (e.ctrlKey && e.shiftKey && e.key === "I") {
                e.preventDefault();
            }
        });
    </script>
</body>

</html>
