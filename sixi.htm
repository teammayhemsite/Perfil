        .destaque {
            position: relative;
            display: inline-block;
        }

        .destaque::after {
            content: "";
            position: absolute;
            left: -10px;
            right: -10px;
            top: 50%;
            height: 120%;
            border: 1px solid red;
            border-radius: 50%;
            transform: translateY(-50%) rotate(-5deg);

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;

            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(15px);

            align-items: center;
            justify-content: center;

<body oncontextmenu="return false">

        <div class="botao" style="color: rgb(0, 0, 0);">Toque para entrar.</div>
    </div>
    <script>
        let prefixo = "@";
        let text = "sixi";
        let i = 0;

        let apagando = false;
        let pausando = false;

        let cursorVisivel = true;
        let piscadas = 0;
        let maxPiscadas = 6;

        function animarTitulo() {
            let cursor = cursorVisivel ? "|" : " ";
            cursorVisivel = !cursorVisivel;

            if (!apagando && !pausando) {
                document.title = prefixo + text.substring(0, i) + cursor;
                i++;

                if (i > text.length) {
                    i = text.length;
                    pausando = true;
                    piscadas = 0;
                    return setTimeout(animarTitulo, 300);
                }

            } else if (pausando) {
                document.title = prefixo + text + cursor;
                piscadas++;

                if (piscadas >= maxPiscadas) {
                    pausando = false;
                    apagando = true;
                    i = text.length;
                }

            } else {
                i--;
                document.title = prefixo + text.substring(0, i) + cursor;

                if (i <= 0) {
                    pausando = true;
                    piscadas = 0;
                    apagando = false;
                    i = 0;
                }
            }

            setTimeout(animarTitulo, 600);
        }

        animarTitulo();
    </script>
