        .card2 {

            padding: 30px;

            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            text-align: center;
            color: rgb(0, 0, 0);
        }

        .hotbar {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);            
        }

        .hotbar button {
            margin: 5px;
            padding: 5px;
            border-radius: 5px;
            cursor: pointer;      
        }

        .mural {

        }

        .ativo {
            display: block;

            color: rgb(0, 0, 0);
        }

        .premium {
            width: 370px;
            padding: 25px;
            border-radius: 20px;
            background: rgba(255, 187, 0, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 145, 0, 0.5);
            box-shadow: 0 8px 30px rgba(255, 166, 0, 0.4);
            text-align: center;
            color: rgb(0, 0, 0);
        }

        .black {
            width: 370px;
            padding: 25px;
            border-radius: 20px;
            background: rgb(153, 153, 153);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgb(110, 110, 110);
            box-shadow: 0 8px 30px rgb(0, 0, 0);
            text-align: center;

        .classic {
            width: 370px;

            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            text-align: center;
            color: rgb(0, 0, 0);
        }

        .perfil {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;

            position: absolute;
            top: 25px;
            left: 7%;
            transform: translate(-50%, -50%);

            border: 2px solid rgba(255, 255, 255, 0.192);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.151);
        }

        .ali {
            position: absolute;
            right: 1px;
            top: 1%;
            text-decoration: none;
            color: black;
            width: 390px;
            padding: 15px;
            border-radius: 20px;
        }

</head>

<body>

    <script>
        function trocar(num) {
            let murais = document.querySelectorAll('.mural');

            murais.forEach(m => m.classList.remove('ativo'));

            document.getElementById('mural' + num).classList.add('ativo');
        }
