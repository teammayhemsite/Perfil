    <script>
        let prefixo = "@";
        let text = "krpris";
        let i = 0;

        let apagando = false;
        let pausando = false;

        let cursorVisivel = true;
        let piscadas = 0;
        let maxPiscadas = 6;

        function animarTitulo() {
            let cursor = cursorVisivel ? "|" : " ";
            cursorVisivel = !cursorVisivel;

            if (!apagando && !pausando) {
                document.title = prefixo + text.substring(0, i) + cursor;
                i++;

                if (i > text.length) {
                    i = text.length;
                    pausando = true;
                    piscadas = 0;
                    return setTimeout(animarTitulo, 300);
                }

            } else if (pausando) {
                document.title = prefixo + text + cursor;
                piscadas++;

                if (piscadas >= maxPiscadas) {
                    pausando = false;
                    apagando = true;
                    i = text.length;
                }

            } else {
                i--;
                document.title = prefixo + text.substring(0, i) + cursor;

                if (i <= 0) {
                    pausando = true;
                    piscadas = 0;
                    apagando = false;
                    i = 0;
                }
            }

            setTimeout(animarTitulo, 600);
        }

        animarTitulo();
    </script>
