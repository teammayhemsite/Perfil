<head>

    <link rel="stylesheet" href="estilos.css">
    <style>
        body {
            background: url(https://i.pinimg.com/1200x/f1/7b/5e/f17b5efa707629f2469f138c0b5ef7ed.jpg) center/cover no-repeat;
            background-color: #000000;
            cursor: url(http://www.rw-designer.com/cursor-extern.php?id=246959), auto;
        }

        .topo {
            margin-top: -90px;
            height: 90px;
            background: url(https://i.pinimg.com/originals/8b/1a/e4/8b1ae4a9ae1ab1b184d8c91264d09f99.gif) center/cover no-repeat;
        }

        .destaque {
            position: relative;
            display: inline-block;
        }

        .destaque::after {
            content: "";
            position: absolute;
            left: -10px;
            right: -10px;
            top: 50%;
            height: 120%;
            border: 1px solid red;
            border-radius: 50%;
            transform: translateY(-50%) rotate(-5deg);
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 999;
        }
    </style>

    <script src="https://kit.fontawesome.com/eb9af641fe.js" crossorigin="anonymous"></script>

    <title>@|</title>
</head>

<body>
    <div id="overlay" onclick="entrar()">
        <p style="color: white;">@krpris</p>
        <div class="botao" style="color: rgb(0, 0, 0);">Toque para entrar.</div>
    </div>
    <script>
        let prefixo = "@";
        let text = "krpris";
        let i = 0;

        let apagando = false;
        let pausando = false;

        let cursorVisivel = true;
        let piscadas = 0;
        let maxPiscadas = 6;

        function animarTitulo() {
            let cursor = cursorVisivel ? "|" : " ";
            cursorVisivel = !cursorVisivel;

            if (!apagando && !pausando) {
                document.title = prefixo + text.substring(0, i) + cursor;
                i++;

                if (i > text.length) {
                    i = text.length;
                    pausando = true;
                    piscadas = 0;
                    return setTimeout(animarTitulo, 300);
                }

            } else if (pausando) {
                document.title = prefixo + text + cursor;
                piscadas++;

                if (piscadas >= maxPiscadas) {
                    pausando = false;
                    apagando = true;
                    i = text.length;
                }

            } else {
                i--;
                document.title = prefixo + text.substring(0, i) + cursor;

                if (i <= 0) {
                    pausando = true;
                    piscadas = 0;
                    apagando = false;
                    i = 0;
                }
            }

            setTimeout(animarTitulo, 600);
        }

        animarTitulo();
    </script>
