<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://cdn.discordapp.com/emojis/1380340818224877710.webp?size=96">
    <link rel="stylesheet" href="estilos.css">
    <style>
        body {
            background: url(z-FundoBasico.gif) center /cover no-repeat;
            background-color: black;
        }

        .topo {
            height: 100px;
            background: url() center/cover no-repeat;
        }
    </style>

    <script src="https://kit.fontawesome.com/eb9af641fe.js" crossorigin="anonymous"></script>

    <title>@|</title>
</head>

<body oncontextmenu="return false">

    <script>
        let prefixo = "@";
        let text = "js";
        let i = 0;

        let apagando = false;
        let pausando = false;

        let cursorVisivel = true;
        let piscadas = 0;
        let maxPiscadas = 6;

        function animarTitulo() {
            let cursor = cursorVisivel ? "|" : " ";
            cursorVisivel = !cursorVisivel;

            if (!apagando && !pausando) {
                document.title = prefixo + text.substring(0, i) + cursor;
                i++;

                if (i > text.length) {
                    i = text.length;
                    pausando = true;
                    piscadas = 0;
                    return setTimeout(animarTitulo, 300);
                }

            } else if (pausando) {
                document.title = prefixo + text + cursor;
                piscadas++;

                if (piscadas >= maxPiscadas) {
                    pausando = false;
                    apagando = true;
                    i = text.length;
                }

            } else {
                i--;
                document.title = prefixo + text.substring(0, i) + cursor;

                if (i <= 0) {
                    pausando = true;
                    piscadas = 0;
                    apagando = false;
                    i = 0;
                }
            }

            setTimeout(animarTitulo, 600);
        }

        animarTitulo();
    </script>

    <div class="card">

        <div class="topo"></div>

        <img src="z-Perfil-js.gif"
            class="perfil">

        <div class="conteudo">
            <h2>Js</h2>
            <div class="icons ">
            </div>
            <p>É só questão de tempo.</p>

            <hr>

            <div class="icons">                
                <a href="https://discord.gg/PzFms6cKQm" target="_blank">
                    <i class="fa-brands fa-discord"></i>
                </a>
            </div>
        </div>

        <a href="https://teammayhem.vercel.app/">
            <i class="fa-solid fa-right-to-bracket" style="color: white;"></i>
        </a>

    </div>

    <script>
document.addEventListener("keydown", function(e) {
    if (e.key === "F12") {
        e.preventDefault();
    }
    if (e.ctrlKey && e.key === "u") {
        e.preventDefault();
    }
    if (e.ctrlKey && e.shiftKey && e.key === "I") {
        e.preventDefault();
    }
});
</script>

</body>

</html>
